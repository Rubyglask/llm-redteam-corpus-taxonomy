name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  build-verify:
    name: build + verify (Phase 1 W4 onward)
    runs-on: ubuntu-latest
    # Skeleton — enable once build_corpus.py is implemented.
    if: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: python scripts/build_corpus.py --tier core     --out data/core/
      - run: python scripts/build_corpus.py --tier extended --out data/extended/
      - run: bash scripts/verify_checksums.sh

  hf-sync:
    name: HF Datasets sync
    runs-on: ubuntu-latest
    needs: build-verify
    if: false  # Enable once HF datasets are live + HF_TOKEN secret is set.
    steps:
      - uses: actions/checkout@v5
      - run: pip install huggingface_hub
      - env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "HF sync step — Phase 1 Week 5-6 enabling."
          # huggingface-cli upload rubyglask/llm-redteam-corpus-taxonomy-core data/core/ ...
